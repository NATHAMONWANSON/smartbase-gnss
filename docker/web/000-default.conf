<VirtualHost *:80>
        ServerAdmin webmaster@localhost
        DocumentRoot /var/www/html

        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined

        <Directory /var/www/html>
                AllowOverride All
                Require all granted
        </Directory>

        # --- Reverse Proxy for GNSS API ---
        ProxyPreserveHost On
        ProxyPass /api/ http://api:5000/api/
        ProxyPassReverse /api/ http://api:5000/api/
        # --- Reverse Proxy for MQTT WebSocket ---
        ProxyPass /mqtt/ ws://192.168.1.21:9001/
        ProxyPassReverse /mqtt/ ws://192.168.1.21:9001/
</VirtualHost>
